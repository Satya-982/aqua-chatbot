<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aqua Chatbot</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="chat-container">
        <h2>🦐 Aqua Assistant</h2>

        <!-- Dark mode toggle -->
        <button class="toggle-btn" onclick="toggleDark()">🌙 Toggle Dark Mode</button>

        <!-- Chat form -->
        <form method="POST">
            <select name="lang">
                <option value="en">English</option>
                <option value="te">తెలుగు</option>
            </select>

            <input type="text" name="message" placeholder="Ask your aqua problem..." required>

            <button type="submit">Ask</button>
        </form>

        <!-- Bot reply -->
        {% if reply %}
        <div class="reply">
            Bot: {{ reply }}
        </div>
        {% endif %}

        <!-- Demo label -->
        <p style="text-align:center; font-size:14px; color:gray; margin-top:20px;">
            Pond Status (Demo Visualization)
        </p>

        <!-- Chart -->
        <canvas id="waterChart" style="margin-top:10px;"></canvas>
    </div>

<script>
/* ---------- DARK MODE (PERSISTENT) ---------- */

// Apply saved mode on page load
if (localStorage.getItem("darkMode") === "on") {
    document.body.classList.add("dark");
}

// Toggle + save state
function toggleDark() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("darkMode", "on");
    } else {
        localStorage.setItem("darkMode", "off");
    }
}

/* ---------- DEMO CHART ---------- */
const ctx = document.getElementById('waterChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['pH', 'Oxygen', 'Ammonia'],
        datasets: [{
            label: 'Sample Pond Values',
            data: [8, 6, 2]
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
